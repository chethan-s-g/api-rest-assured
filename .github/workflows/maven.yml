name: Maven API Test Pipeline

on:
  schedule:
    - cron: '30 4 * * *'
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  api-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, stage, prod]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Run API tests for ${{ matrix.environment }}
        run: mvn -B clean test -Denv=${{ matrix.environment }} -Dallure.results.directory=${{ github.workspace }}/target/allure-results-${{ matrix.environment }}

      - name: Generate Allure report for ${{ matrix.environment }}
        if: always()
        run: mvn -B allure:report -Dallure.results.directory=${{ github.workspace }}/target/allure-results-${{ matrix.environment }} -Dallure.report.directory=${{ github.workspace }}/target/allure-report-${{ matrix.environment }}

      - name: Zip Allure report for ${{ matrix.environment }}
        if: always()
        run: |
          cd target
          zip -r allure-report-${{ matrix.environment }}.zip allure-report-${{ matrix.environment }}

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.environment }}
          path: target/allure-report-${{ matrix.environment }}.zip

      - name: Prepare Pages artifact (prod only)
        if: matrix.environment == 'prod' && always()
        run: |
          DATE=$(date +%Y-%m-%d)
          UNIQUE_DIR="target/reports/v${DATE}-${GITHUB_RUN_ID}"
          mkdir -p "$UNIQUE_DIR"
          cp -r target/allure-report-${{ matrix.environment }}/* "$UNIQUE_DIR/"
          echo "<!DOCTYPE html><html><body><h1>Reports</h1><p><a href='./reports/v${DATE}-${GITHUB_RUN_ID}/index.html'>Open Report</a></p></body></html>" > target/index.html

      - name: Upload Allure report to Pages
        if: matrix.environment == 'prod' && always()
        uses: actions/upload-pages-artifact@v4
        with:
          name: github-pages
          path: target

  deploy-and-release:
    runs-on: ubuntu-latest
    needs: api-tests
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Allure report artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Flatten artifact structure
        run: |
          mv ./artifacts/allure-report-dev/*.zip ./artifacts/
          mv ./artifacts/allure-report-stage/*.zip ./artifacts/
          mv ./artifacts/allure-report-prod/*.zip ./artifacts/

      - name: Unzip prod report artifact
        run: |
          mkdir -p target/allure-report-prod
          unzip ./artifacts/allure-report-prod.zip -d target/allure-report-prod

      - name: Create release with reports
        run: |
          DATE=$(date +%Y-%m-%d)
          RELEASE_TAG="v${DATE}-${GITHUB_RUN_ID}"
          RELEASE_BODY="Allure reports for $DATE (dev, stage, prod environments)."
          
          gh release create "$RELEASE_TAG" \
            --title "Reports for $DATE (Run $GITHUB_RUN_ID)" \
            --notes "$RELEASE_BODY" \
            ./artifacts/allure-report-dev.zip \
            ./artifacts/allure-report-stage.zip \
            ./artifacts/allure-report-prod.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy unique report into gh-pages branch
        run: |
          DATE=$(date +%Y-%m-%d)
          UNIQUE_DIR="reports/v${DATE}-${GITHUB_RUN_ID}"
          mkdir -p gh-pages/$UNIQUE_DIR
          cp -r target/allure-report-prod/* gh-pages/$UNIQUE_DIR/

      - name: Update README.md with new report link
        run: |
          DATE=$(date +%Y-%m-%d)
          FORMATTED_DATE=$(date +"%B %d, %Y")
          REPORT_URL="https://chethan-s-g.github.io/api-rest-assured/reports/v${DATE}-${GITHUB_RUN_ID}/index.html"
          
          cd gh-pages
          sed -i "4i - [$FORMATTED_DATE]($REPORT_URL) - Unique Prod report (Run $GITHUB_RUN_ID)" README.md
          
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add README.md reports/
          git commit -m "Add link and report for $DATE (Run $GITHUB_RUN_ID)" || echo "No changes"
          git push origin gh-pages

  deploy-pages:
    runs-on: ubuntu-latest
    needs: api-tests
    if: always()
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
