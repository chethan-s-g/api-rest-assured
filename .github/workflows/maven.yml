name: Maven API Test Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  api-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, stage, prod]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Run API tests for ${{ matrix.environment }}
        run: mvn -B clean test -Denv=${{ matrix.environment }} -Dallure.results.directory=target/allure-results-${{ matrix.environment }}

      - name: Generate Allure report for ${{ matrix.environment }}
        if: always()
        run: mvn -B allure:report -Dallure.results.directory=target/allure-results-${{ matrix.environment }} -Dallure.report.directory=target/allure-report-${{ matrix.environment }}

      - name: Zip Allure report for ${{ matrix.environment }}
        if: always()
        run: |
          cd target
          zip -r allure-report-${{ matrix.environment }}.zip allure-report-${{ matrix.environment }}

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.environment }}
          path: target/allure-report-${{ matrix.environment }}.zip

      - name: Upload Allure report to Pages
        if: matrix.environment == 'prod' && always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/allure-report-${{ matrix.environment }}

  deploy:
    runs-on: ubuntu-latest
    needs: api-tests
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
