name: Maven API Test Pipeline

on:
  schedule:
    - cron: '30 4 * * *'
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  api-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, stage, prod]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Run API tests for ${{ matrix.environment }}
        run: mvn -B clean test -Denv=${{ matrix.environment }} -Dallure.results.directory=${{ github.workspace }}/target/allure-results-${{ matrix.environment }}

      - name: Generate Allure report for ${{ matrix.environment }}
        if: always()
        run: mvn -B allure:report -Dallure.results.directory=${{ github.workspace }}/target/allure-results-${{ matrix.environment }} -Dallure.report.directory=${{ github.workspace }}/target/allure-report-${{ matrix.environment }}

      - name: Zip Allure report for ${{ matrix.environment }}
        if: always()
        run: |
          cd target
          zip -r allure-report-${{ matrix.environment }}.zip allure-report-${{ matrix.environment }}

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.environment }}
          path: target/allure-report-${{ matrix.environment }}.zip

      - name: Upload Allure report to Pages
        if: matrix.environment == 'prod' && always()
        uses: actions/upload-pages-artifact@v4
        with:
          name: github-pages
          path: target/allure-report-${{ matrix.environment }}

  deploy-and-release:
    runs-on: ubuntu-latest
    needs: api-tests
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Allure report artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Flatten artifact structure
        run: |
          mv ./artifacts/allure-report-dev/*.zip ./artifacts/
          mv ./artifacts/allure-report-stage/*.zip ./artifacts/
          mv ./artifacts/allure-report-prod/*.zip ./artifacts/

      - name: Create release with reports
        run: |
          DATE=$(date +%Y-%m-%d)
          RELEASE_TAG="v$DATE"
          RELEASE_BODY="Allure reports for $DATE (dev, stage, prod environments)."
          
          gh release create "$RELEASE_TAG" \
            --title "Reports for $DATE" \
            --notes "$RELEASE_BODY" \
            ./artifacts/allure-report-dev.zip \
            ./artifacts/allure-report-stage.zip \
            ./artifacts/allure-report-prod.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Update README.md with new release link
        run: |
          DATE=$(date +%Y-%m-%d)
          FORMATTED_DATE=$(date +"%B %d, %Y")  # e.g., "May 01, 2026"
          RELEASE_URL="https://github.com/chethan-s-g/api-rest-assured/releases/tag/v$DATE"
          
          cd gh-pages
          # Add new entry at the top (after the header)
          sed -i "4i - [$FORMATTED_DATE]($RELEASE_URL) - Dev, Stage, Prod reports" README.md
          
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add README.md
          git commit -m "Add link for reports on $DATE" || echo "No changes"
          git push origin gh-pages
